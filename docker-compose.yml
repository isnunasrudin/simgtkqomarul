name: simgtkqomarul-production
services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - /srv/simgtkqomarul:/srv/simgtkqomarul
        depends_on:
            - db
        environment:
            SSL_MODE: "mixed"
            AUTORUN_ENABLED: false
            PHP_OPCACHE_ENABLE: "1"
            PHP_MEMORY_LIMIT: "1024M"
            NGINX_WEBROOT: "/srv/simgtkqomarul/release/public"

    db:
        image: postgres:16

        environment:
            POSTGRES_DB: ${DB_DATABASE:-laravel_db}
            POSTGRES_USER: ${DB_USERNAME:-laravel_user}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}

        volumes:
            - ./storage/database:/var/lib/postgresql/data